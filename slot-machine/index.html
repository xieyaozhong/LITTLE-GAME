<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#100b25" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PIXEL SLOT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="machine">
    <nav class="game-nav" aria-label="遊戲切換">
      <a href="../">轉盤</a>
      <a href="../pachinko/">柏青哥</a>
      <a class="active" href="./" aria-current="page">拉霸機</a>
    </nav>

    <header class="header">
      <p class="eyebrow">LUCKY PIXEL ARCADE</p>
      <h1>PIXEL SLOT</h1>
      <p class="status" id="status" role="status" aria-live="polite">調整下注，按下 SPIN！</p>
    </header>

    <section class="hud" aria-label="遊戲狀態">
      <div class="hud-card"><span>CREDITS</span><strong id="credits">1000</strong></div>
      <div class="hud-card"><span>BET</span><strong id="betDisplay">20</strong></div>
      <div class="hud-card jackpot-card"><span>JACKPOT</span><strong id="jackpot">5000</strong></div>
      <div class="hud-card"><span>BEST</span><strong id="best">1000</strong></div>
    </section>

    <section class="slot-window" aria-label="拉霸滾輪">
      <div class="payline" aria-hidden="true"></div>
      <div class="reel" data-reel="0">
        <div class="symbol dim">◆</div><div class="symbol center">7</div><div class="symbol dim">★</div>
      </div>
      <div class="reel" data-reel="1">
        <div class="symbol dim">★</div><div class="symbol center">7</div><div class="symbol dim">●</div>
      </div>
      <div class="reel" data-reel="2">
        <div class="symbol dim">♛</div><div class="symbol center">7</div><div class="symbol dim">◆</div>
      </div>
      <div class="win-flash" id="winFlash" aria-hidden="true"></div>
    </section>

    <section class="message-panel">
      <div class="last-win"><span>LAST WIN</span><strong id="lastWin">0</strong></div>
      <div class="free-spins" id="freeSpinBox"><span>FREE SPINS</span><strong id="freeSpins">0</strong></div>
    </section>

    <section class="control-panel" aria-label="拉霸控制區">
      <div class="bet-controls">
        <button id="betDown" class="small secondary" aria-label="減少下注">−</button>
        <div class="bet-readout"><span>下注</span><strong id="betReadout">20</strong></div>
        <button id="betUp" class="small secondary" aria-label="增加下注">＋</button>
        <button id="maxBet" class="small secondary">MAX</button>
      </div>

      <div class="main-controls">
        <button id="spinBtn" class="spin-button"><span class="spin-icon">▶</span><span>SPIN</span></button>
        <button id="autoBtn" class="secondary" aria-pressed="false"><span class="button-icon">∞</span><span>自動：關</span></button>
        <button id="soundBtn" class="secondary" aria-pressed="true"><span class="button-icon">♪</span><span>音效：開</span></button>
      </div>
    </section>

    <details class="paytable">
      <summary>獎金表與玩法</summary>
      <div class="pay-grid">
        <div><span>7 7 7</span><strong>JACKPOT</strong></div>
        <div><span>♛ ♛ ♛</span><strong>×30</strong></div>
        <div><span>★ ★ ★</span><strong>×20 + 3 次免費</strong></div>
        <div><span>◆ ◆ ◆</span><strong>×12</strong></div>
        <div><span>● ● ●</span><strong>×8</strong></div>
        <div><span>♥ ♥ ♥</span><strong>×5</strong></div>
        <div><span>任意一對</span><strong>×2</strong></div>
      </div>
      <p>每次轉動會從點數中扣除下注額。所有點數僅供遊戲娛樂，不涉及真實金錢或兌換。</p>
    </details>
  </main>

  <script src="game.js" defer></script>
</body>
</html>
