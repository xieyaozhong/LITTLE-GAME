<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#100b2c">
  <title>PIXEL RIFT：裂隙生存者</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#09061d;touch-action:none}
    iframe{display:none;width:100%;height:100%;border:0;background:#09061d}
    #loading{position:fixed;inset:0;display:grid;place-items:center;color:#ffd166;font:700 18px "Courier New",monospace;letter-spacing:.08em;background:#09061d}
  </style>
</head>
<body>
  <div id="loading">OPENING PIXEL RIFT V3...</div>
  <iframe id="gameFrame" src="../index.html?v=3" title="PIXEL RIFT 裂隙生存者" allow="autoplay; fullscreen"></iframe>
  <script>
    const frame=document.getElementById('gameFrame');
    frame.addEventListener('load',()=>{
      const loading=document.getElementById('loading');
      if(loading) loading.remove();
      frame.style.display='block';
    });
  </script>
</body>
</html>
