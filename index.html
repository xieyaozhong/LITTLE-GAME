<title>像素轉盤抽獎機</title>
<style>
:root{--ink:#24173a;--panel:#fff1c7;--accent:#ff4f78;--accent-dark:#b92758;--sky:#8ed7c6;--grass:#4d7d53}*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;display:grid;place-items:center;padding:20px;overflow-x:hidden;color:var(--ink);font-family:"Courier New","PingFang TC",monospace;background:linear-gradient(#5f4b8b,#2d2344);background-attachment:fixed}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:16px 16px}.machine{width:min(100%,980px);padding:24px;position:relative;background:var(--panel);border:6px solid var(--ink);box-shadow:10px 10px 0 rgba(0,0,0,.35)}.machine:before{content:"";position:absolute;inset:8px;border:4px dashed #d79b58;pointer-events:none}.header,.game-area{position:relative;z-index:1}.header{text-align:center;margin-bottom:18px}h1{margin:0;font-size:clamp(28px,6vw,54px);letter-spacing:4px;text-shadow:4px 4px 0 #ffbf66}.subtitle{margin:8px 0 0;font-weight:900}.game-area{display:grid;grid-template-columns:minmax(350px,1.25fr) minmax(280px,.75fr);gap:24px;align-items:center}.wheel-box{min-height:540px;display:grid;place-items:center;position:relative;padding:42px 52px 68px 10px;background:var(--sky);border:6px solid var(--ink);box-shadow:inset 0 0 0 8px #4a9f92;overflow:hidden}.wheel-box:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 15% 18%,#fff 0 3px,transparent 4px),radial-gradient(circle at 78% 15%,#fff 0 2px,transparent 3px),radial-gradient(circle at 85% 39%,#fff 0 3px,transparent 4px);opacity:.75}.wheel-box:after{content:"";position:absolute;bottom:0;left:0;width:100%;height:60px;background:repeating-linear-gradient(90deg,var(--grass) 0 24px,#3d6744 24px 48px);border-top:5px solid var(--ink);z-index:1}.pointer{position:absolute;top:16px;left:46%;transform:translateX(-50%);border-left:24px solid transparent;border-right:24px solid transparent;border-top:56px solid var(--accent);filter:drop-shadow(4px 4px 0 var(--ink));z-index:8}.wheel-shell{width:min(78vw,420px);aspect-ratio:1;padding:12px;border-radius:50%;background:#ffd057;border:8px solid var(--ink);box-shadow:8px 8px 0 rgba(36,23,58,.55);z-index:3;position:relative;transform:translateX(-4%)}canvas{width:100%;height:100%;display:block;border-radius:50%;image-rendering:pixelated;transform:rotate(0);will-change:transform}.hub{position:absolute;left:50%;top:50%;width:74px;height:74px;transform:translate(-50%,-50%);border-radius:50%;background:var(--accent);border:7px solid var(--ink);box-shadow:inset 0 0 0 7px #ff94a7;z-index:5}.crank{position:absolute;right:-30px;top:48%;width:68px;height:18px;background:#f2e9d6;border:5px solid var(--ink);transform-origin:9px 50%;z-index:6;box-shadow:3px 3px 0 rgba(36,23,58,.35)}.crank:before{content:"";position:absolute;right:-17px;top:-11px;width:28px;height:28px;border:5px solid var(--ink);background:#ffbf66;border-radius:50%}.crank:after{content:"";position:absolute;left:-11px;top:-10px;width:28px;height:28px;border:5px solid var(--ink);background:#62c6ff;border-radius:50%}.pixel-helper{position:absolute;right:3px;bottom:52px;width:124px;height:152px;z-index:7;pointer-events:none;transform-origin:50% 100%;filter:drop-shadow(5px 5px 0 rgba(36,23,58,.28))}.pixel-helper svg{width:100%;height:100%;display:block;shape-rendering:crispEdges;image-rendering:pixelated}.helper-bubble{position:absolute;right:8px;bottom:205px;z-index:7;max-width:138px;padding:8px 10px;background:#fffef7;border:4px solid var(--ink);font-size:12px;font-weight:900;text-align:center;box-shadow:4px 4px 0 rgba(36,23,58,.25);transition:.2s}.helper-bubble:after{content:"";position:absolute;right:22px;bottom:-13px;width:14px;height:14px;background:#fffef7;border-right:4px solid var(--ink);border-bottom:4px solid var(--ink);transform:rotate(45deg)}.pixel-helper .arm-front,.pixel-helper .arm-back,.pixel-helper .tail,.pixel-helper .ear-left,.pixel-helper .ear-right{transform-box:fill-box}.pixel-helper .arm-front,.pixel-helper .arm-back{transform-origin:20% 35%}.pixel-helper .tail{transform-origin:15% 70%}.pixel-helper .ear-left,.pixel-helper .ear-right{transform-origin:50% 100%}.wheel-box[data-character="cat"] .pixel-helper .tail{animation:catTail 1.3s steps(2,end) infinite}@keyframes catTail{50%{transform:rotate(-12deg)}}.wheel-box[data-character="cat"].is-spinning .pixel-helper{animation:catDash .45s steps(4,end) both,catBounce .28s steps(2,end) .45s infinite}.wheel-box[data-character="cat"].is-spinning .arm-front{animation:catArm .36s steps(4,end) .38s infinite}.wheel-box[data-character="cat"].is-spinning .tail{animation:catTailFast .18s steps(2,end) infinite}.wheel-box[data-character="cat"].is-spinning .crank{animation:crankSpin .36s linear infinite}@keyframes catDash{0%{transform:translateX(38px) scale(.94)}100%{transform:translateX(-12px)}}@keyframes catBounce{50%{transform:translateX(-12px) translateY(-5px) rotate(-2deg)}}@keyframes catArm{0%,100%{transform:rotate(-25deg)}50%{transform:rotate(30deg)}}@keyframes catTailFast{50%{transform:rotate(-24deg)}}.wheel-box[data-character="bear"] .pixel-helper{animation:bearIdle 1.6s steps(2,end) infinite}@keyframes bearIdle{50%{transform:scaleY(.97) translateY(2px)}}.wheel-box[data-character="bear"].is-spinning .pixel-helper{animation:bearEnter .85s steps(5,end) both,bearPush .72s steps(3,end) .85s infinite}.wheel-box[data-character="bear"].is-spinning .arm-front{animation:bearArmFront .72s steps(3,end) .8s infinite}.wheel-box[data-character="bear"].is-spinning .arm-back{animation:bearArmBack .72s steps(3,end) .8s infinite}.wheel-box[data-character="bear"].is-spinning .crank{animation:crankSpin 1.05s steps(8,end) infinite}@keyframes bearEnter{0%{transform:translateX(42px)}70%{transform:translateX(-5px) rotate(5deg)}100%{transform:translateX(-15px) rotate(-7deg)}}@keyframes bearPush{0%,100%{transform:translateX(-15px) rotate(-7deg)}50%{transform:translateX(-25px) rotate(-14deg) scaleX(1.03)}}@keyframes bearArmFront{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(38deg)}}@keyframes bearArmBack{0%,100%{transform:rotate(16deg)}50%{transform:rotate(48deg)}}.wheel-box[data-character="rabbit"] .ear-left{animation:rabbitEarL 1.4s steps(2,end) infinite}.wheel-box[data-character="rabbit"] .ear-right{animation:rabbitEarR 1.4s steps(2,end) .12s infinite}@keyframes rabbitEarL{50%{transform:rotate(-9deg)}}@keyframes rabbitEarR{50%{transform:rotate(10deg)}}.wheel-box[data-character="rabbit"].is-spinning .pixel-helper{animation:rabbitLeap .26s steps(3,end) both,rabbitHop .22s steps(2,end) .26s infinite}.wheel-box[data-character="rabbit"].is-spinning .arm-front{animation:rabbitArm .17s steps(2,end) .24s infinite}.wheel-box[data-character="rabbit"].is-spinning .ear-left{animation:rabbitEarFastL .18s steps(2,end) infinite}.wheel-box[data-character="rabbit"].is-spinning .ear-right{animation:rabbitEarFastR .18s steps(2,end) infinite}.wheel-box[data-character="rabbit"].is-spinning .crank{animation:crankSpin .19s linear infinite}@keyframes rabbitLeap{0%{transform:translate(42px,12px) scale(.9)}50%{transform:translate(6px,-26px) scale(1.04)}100%{transform:translate(-12px,0)}}@keyframes rabbitHop{50%{transform:translate(-12px,-12px) rotate(2deg)}}@keyframes rabbitArm{0%,100%{transform:rotate(-34deg)}50%{transform:rotate(38deg)}}@keyframes rabbitEarFastL{50%{transform:rotate(-18deg)}}@keyframes rabbitEarFastR{50%{transform:rotate(19deg)}}@keyframes crankSpin{to{transform:rotate(360deg)}}.wheel-box.is-spinning .helper-bubble{transform:translateY(-3px)}.control{display:grid;gap:15px}.screen{min-height:125px;padding:18px;display:grid;place-items:center;text-align:center;color:#d8ff88;background:#182131;border:6px solid var(--ink);box-shadow:inset 0 0 0 5px #30445b;font-size:20px;line-height:1.45;text-shadow:2px 2px #000}.screen strong{display:block;color:#fff27b;font-size:clamp(23px,4vw,30px);word-break:break-word}.screen small{display:block;margin-top:5px}.spin{min-height:82px;border:6px solid var(--ink);background:var(--accent);color:#fff;font:900 26px/1 "Courier New","PingFang TC",monospace;letter-spacing:3px;cursor:pointer;box-shadow:6px 6px 0 var(--ink),inset 0 -10px 0 var(--accent-dark)}.spin:active,.small:active,.character-btn:active{transform:translate(4px,4px);box-shadow:none}.spin:disabled{filter:grayscale(.6);cursor:not-allowed}.character-panel{padding:12px;background:#fff8df;border:5px solid var(--ink)}.character-title{margin:0 0 9px;font-weight:900}.character-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.character-btn{min-height:76px;padding:7px 4px;border:4px solid var(--ink);background:#e9ddff;color:var(--ink);font:900 12px/1.25 "Courier New","PingFang TC",monospace;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}.character-btn .emoji{display:block;font-size:25px;margin-bottom:4px}.character-btn[aria-pressed="true"]{background:#fff27b;outline:4px solid #ff7b8f;outline-offset:-7px}.character-info{min-height:42px;margin-top:9px;padding:8px;background:#182131;color:#d8ff88;border:4px solid var(--ink);font-size:12px;line-height:1.45}.editor{padding:14px;background:#fff8df;border:5px solid var(--ink)}label{display:block;margin-bottom:8px;font-weight:900}textarea{width:100%;min-height:145px;resize:vertical;padding:10px;color:var(--ink);background:#fffef7;border:4px solid var(--ink);font:700 15px/1.45 "Courier New","PingFang TC",monospace;outline:none}.small{width:100%;margin-top:10px;padding:11px;border:4px solid var(--ink);background:#62c6ff;color:var(--ink);font:900 16px/1 "Courier New","PingFang TC",monospace;cursor:pointer;box-shadow:4px 4px 0 var(--ink)}.preview{margin-top:10px;padding:10px;min-height:48px;background:#182131;color:#d8ff88;border:4px solid var(--ink);font-size:12px;line-height:1.55}.preview strong{color:#fff27b}.error{color:#ff94a7}.tip{font-size:13px;line-height:1.5;margin:0}.confetti{position:fixed;width:10px;height:10px;z-index:20;pointer-events:none;animation:fall 1.8s steps(10) forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}@media(prefers-reduced-motion:reduce){.pixel-helper,.pixel-helper *,.crank{animation:none!important}}@media(max-width:760px){body{padding:10px}.machine{padding:16px}.game-area{grid-template-columns:1fr}.wheel-box{min-height:480px;padding:40px 31px 68px 2px}.wheel-shell{width:min(75vw,355px);transform:translateX(-6%)}.pointer{left:44%}.pixel-helper{width:96px;height:120px;right:-2px;bottom:53px}.helper-bubble{right:0;bottom:168px;font-size:10px;max-width:108px}.crank{right:-25px}.screen{min-height:108px}.character-grid{gap:6px}.character-btn{font-size:11px}}
</style>
</head>
<body>
<main class="machine">
<header class="header"><h1>LUCKY WHEEL</h1><p class="subtitle">★ 像素轉盤抽獎機 ★</p></header>
<section class="game-area">
<div class="wheel-box" id="wheelBox" data-character="cat"><div class="pointer"></div><div class="wheel-shell"><canvas id="wheel" width="900" height="900"></canvas><div class="hub"></div><div class="crank" aria-hidden="true"></div></div><div class="helper-bubble" id="helperBubble">準備好了喵！</div><div class="pixel-helper" id="pixelHelper" aria-hidden="true"></div></div>
<aside class="control">
<div class="screen" id="screen" aria-live="polite">投入勇氣幣<br>按下開始抽獎！</div>
<button class="spin" id="spin">START!</button>
<section class="character-panel" aria-labelledby="characterTitle"><p class="character-title" id="characterTitle">選擇轉盤助手</p><div class="character-grid" id="characterGrid"><button class="character-btn" data-character="cat" aria-pressed="true"><span class="emoji">🐱</span>橘貓阿輪</button><button class="character-btn" data-character="bear" aria-pressed="false"><span class="emoji">🐻</span>大力熊熊</button><button class="character-btn" data-character="rabbit" aria-pressed="false"><span class="emoji">🐰</span>閃電兔兔</button></div><div class="character-info" id="characterInfo"></div></section>
<div class="editor"><label for="input">獎項設定（名稱 | 權重）</label><textarea id="input">頭獎：神秘禮物 | 5
二獎：飲料一杯 | 15
三獎：小點心 | 20
再抽一次 | 10
幸運貼紙 | 20
銘謝惠顧 | 30</textarea><button class="small" id="update">更新轉盤與機率</button><div class="preview" id="preview"></div></div>
<p class="tip">每行輸入「獎項名稱 | 權重」。權重不必加總為 100，系統會自動換算；省略權重時預設為 1。支援 2～12 個獎項，按空白鍵也能抽獎。</p>
</aside></section></main>
<script>
const canvas=document.querySelector('#wheel'),ctx=canvas.getContext('2d'),wheelBox=document.querySelector('#wheelBox'),pixelHelper=document.querySelector('#pixelHelper'),helperBubble=document.querySelector('#helperBubble'),characterInfo=document.querySelector('#characterInfo'),characterGrid=document.querySelector('#characterGrid'),spinBtn=document.querySelector('#spin'),updateBtn=document.querySelector('#update'),input=document.querySelector('#input'),screen=document.querySelector('#screen'),preview=document.querySelector('#preview');
const colors=['#ff6b7f','#ffd35a','#55d6be','#62a8ff','#c77dff','#ff9f43','#70d66b','#ff79c6','#8be9fd','#f1fa8c','#bd93f9','#ffb86c'];let prizes=[],rotation=0,spinning=false,audio,currentCharacter='cat';
const esc=s=>s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));
const characterSvgs={cat:`<svg viewBox="0 0 118 145"><g class="tail"><rect x="88" y="84" width="15" height="13" fill="#24173a"/><rect x="99" y="73" width="13" height="25" fill="#24173a"/><rect x="91" y="75" width="12" height="13" fill="#f7a84a"/><rect x="99" y="66" width="11" height="20" fill="#f7a84a"/></g><rect x="30" y="43" width="58" height="49" fill="#24173a"/><rect x="35" y="48" width="48" height="39" fill="#f7a84a"/><rect x="31" y="30" width="18" height="22" fill="#24173a"/><rect x="69" y="30" width="18" height="22" fill="#24173a"/><rect x="36" y="33" width="12" height="18" fill="#f7a84a"/><rect x="70" y="33" width="12" height="18" fill="#f7a84a"/><rect x="39" y="60" width="8" height="8" fill="#24173a"/><rect x="71" y="60" width="8" height="8" fill="#24173a"/><rect x="56" y="68" width="7" height="6" fill="#ff7b8f"/><rect x="50" y="76" width="18" height="5" fill="#fff1c7"/><rect x="38" y="88" width="48" height="38" fill="#24173a"/><rect x="43" y="92" width="38" height="30" fill="#62c6ff"/><rect x="51" y="94" width="22" height="9" fill="#fff1c7"/><rect x="38" y="119" width="18" height="19" fill="#24173a"/><rect x="68" y="119" width="18" height="19" fill="#24173a"/><rect x="41" y="124" width="15" height="10" fill="#f7a84a"/><rect x="68" y="124" width="15" height="10" fill="#f7a84a"/><g class="arm-front"><rect x="18" y="91" width="31" height="13" fill="#24173a"/><rect x="22" y="94" width="27" height="7" fill="#f7a84a"/><rect x="12" y="86" width="16" height="20" fill="#24173a"/><rect x="15" y="90" width="12" height="13" fill="#fff1c7"/></g></svg>`,bear:`<svg viewBox="0 0 118 145"><circle cx="37" cy="42" r="16" fill="#24173a"/><circle cx="80" cy="42" r="16" fill="#24173a"/><circle cx="37" cy="42" r="9" fill="#9a663b"/><circle cx="80" cy="42" r="9" fill="#9a663b"/><rect x="27" y="40" width="63" height="53" fill="#24173a"/><rect x="32" y="45" width="53" height="43" fill="#9a663b"/><rect x="40" y="66" width="36" height="19" fill="#e8bd83"/><rect x="44" y="58" width="8" height="8" fill="#24173a"/><rect x="70" y="58" width="8" height="8" fill="#24173a"/><rect x="56" y="69" width="8" height="7" fill="#24173a"/><rect x="38" y="88" width="51" height="39" fill="#24173a"/><rect x="43" y="93" width="41" height="29" fill="#ff9f43"/><rect x="48" y="96" width="31" height="8" fill="#fff1c7"/><g class="arm-back"><rect x="70" y="91" width="36" height="15" fill="#24173a"/><rect x="73" y="95" width="30" height="8" fill="#9a663b"/><rect x="98" y="89" width="15" height="20" fill="#24173a"/><rect x="100" y="93" width="11" height="13" fill="#e8bd83"/></g><g class="arm-front"><rect x="15" y="92" width="39" height="15" fill="#24173a"/><rect x="20" y="96" width="32" height="8" fill="#9a663b"/><rect x="9" y="88" width="16" height="22" fill="#24173a"/><rect x="12" y="93" width="11" height="14" fill="#e8bd83"/></g><rect x="39" y="120" width="20" height="19" fill="#24173a"/><rect x="69" y="120" width="20" height="19" fill="#24173a"/><rect x="42" y="125" width="16" height="10" fill="#9a663b"/><rect x="69" y="125" width="16" height="10" fill="#9a663b"/></svg>`,rabbit:`<svg viewBox="0 0 118 145"><g class="ear-left"><rect x="34" y="6" width="20" height="50" fill="#24173a"/><rect x="39" y="11" width="10" height="39" fill="#ffd8e7"/></g><g class="ear-right"><rect x="65" y="4" width="20" height="52" fill="#24173a"/><rect x="70" y="10" width="10" height="40" fill="#ffd8e7"/></g><rect x="28" y="45" width="62" height="49" fill="#24173a"/><rect x="33" y="50" width="52" height="39" fill="#f3f0ff"/><rect x="40" y="62" width="8" height="9" fill="#24173a"/><rect x="71" y="62" width="8" height="9" fill="#24173a"/><rect x="56" y="71" width="8" height="6" fill="#ff7b8f"/><rect x="48" y="80" width="24" height="5" fill="#ffd8e7"/><rect x="39" y="90" width="49" height="36" fill="#24173a"/><rect x="44" y="95" width="39" height="27" fill="#c77dff"/><rect x="49" y="98" width="29" height="8" fill="#fff1c7"/><g class="arm-front"><rect x="14" y="91" width="40" height="13" fill="#24173a"/><rect x="18" y="94" width="34" height="7" fill="#f3f0ff"/><rect x="8" y="86" width="16" height="20" fill="#24173a"/><rect x="11" y="90" width="11" height="13" fill="#ffd8e7"/></g><rect x="37" y="120" width="20" height="18" fill="#24173a"/><rect x="70" y="120" width="20" height="18" fill="#24173a"/><rect x="39" y="124" width="19" height="10" fill="#f3f0ff"/><rect x="69" y="124" width="19" height="10" fill="#f3f0ff"/><rect x="88" y="96" width="17" height="17" fill="#24173a"/><rect x="92" y="100" width="10" height="10" fill="#f3f0ff"/></svg>`};
const characters={cat:{name:'橘貓阿輪',description:'均衡型：先跑近輪盤，再用貓掌穩定連轉。',idle:'準備好了喵！',start:'看我的貓掌！',result:'抓到獎品了喵！',duration:4300,windup:380,minSpins:6,maxSpins:9,tickStep:12,baseTone:520,ease:p=>1-Math.pow(1-p,5)},bear:{name:'大力熊熊',description:'力量型：先蓄力，再用雙手慢慢推出沉重轉勢。',idle:'熊熊先暖身！',start:'蓄力……嘿呀！',result:'穩穩停住熊！',duration:5600,windup:900,minSpins:4,maxSpins:6,tickStep:17,baseTone:350,ease:p=>1-Math.pow(1-p,3)},rabbit:{name:'閃電兔兔',description:'速度型：跳躍起步，用超快節奏連續轉動。',idle:'隨時可以起跳！',start:'跳跳加速！',result:'咻——抽到了！',duration:3100,windup:180,minSpins:9,maxSpins:12,tickStep:9,baseTone:680,ease:p=>p===1?1:1-Math.pow(2,-10*p)}};
function selectCharacter(key,announce=true){if(spinning||!characters[key])return;currentCharacter=key;wheelBox.dataset.character=key;pixelHelper.innerHTML=characterSvgs[key];characterGrid.querySelectorAll('.character-btn').forEach(btn=>btn.setAttribute('aria-pressed',String(btn.dataset.character===key)));characterInfo.innerHTML=`<strong>${characters[key].name}</strong><br>${characters[key].description}`;helperBubble.textContent=characters[key].idle;localStorage.setItem('luckyWheelCharacter',key);if(announce)screen.innerHTML=`助手已更換！<br><strong>${characters[key].name}</strong>`}
function parse(line,i){const p=line.trim().split(/\s*[|｜,，\t]\s*/),name=(p.shift()||'').trim(),raw=p.join('').replace('%','').trim(),weight=raw===''?1:Number(raw);if(!name)throw Error(`第 ${i+1} 行缺少名稱`);if(!Number.isFinite(weight)||weight<=0)throw Error(`第 ${i+1} 行權重需大於 0`);return{name,weight}}
function load(){try{const rows=input.value.split('\n').filter(x=>x.trim()).slice(0,12).map(parse);if(rows.length<2)throw Error('至少需要 2 個獎項');const total=rows.reduce((s,x)=>s+x.weight,0);let c=0;prizes=rows.map(x=>{const probability=x.weight/total,startDeg=c*360;c+=probability;return{...x,probability,startDeg,endDeg:c*360}});draw();preview.innerHTML=prizes.map((x,i)=>`<div><strong>${i+1}. ${esc(x.name)}</strong>：${(x.probability*100).toFixed(2).replace(/\.00$/,'')}%</div>`).join('');screen.innerHTML='轉盤與機率已更新！<br>準備抽獎';helperBubble.textContent=characters[currentCharacter].idle}catch(e){preview.innerHTML=`<span class="error">⚠ ${esc(e.message)}</span>`;screen.innerHTML='設定有誤<br>請檢查獎項與權重';helperBubble.textContent='設定怪怪的…'}}
function measureLines(text,maxWidth,fontSize,maxLines=2){ctx.font=`900 ${fontSize}px "Arial Black","PingFang TC",sans-serif`;const chars=[...text];let lines=[],line='';for(const ch of chars){const next=line+ch;if(ctx.measureText(next).width<=maxWidth||!line)line=next;else{lines.push(line);line=ch;if(lines.length===maxLines-1)break}}if(line&&lines.length<maxLines)lines.push(line);const used=lines.join('').length;if(used<chars.length){let last=lines[lines.length-1]||'';while(last&&ctx.measureText(last+'…').width>maxWidth)last=last.slice(0,-1);lines[lines.length-1]=(last||'')+'…'}return lines}
function fitLabel(text,maxWidth,maxHeight){let size=Math.min(34,Math.floor(maxHeight/2.15));for(;size>=12;size--){const lines=measureLines(text,maxWidth,size,2),lineHeight=size*1.12;if(lines.length*lineHeight<=maxHeight&&lines.every(line=>ctx.measureText(line).width<=maxWidth))return{size,lines,lineHeight}}return{size:12,lines:['…'],lineHeight:14}}
function drawLabel(p,i,start,end,r){const arc=end-start,mid=(start+end)/2,labelRadius=r*.66,tangentWidth=Math.max(24,2*labelRadius*Math.sin(Math.min(arc,Math.PI)/2)*.78),radialHeight=r*.28;ctx.save();ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r-11,start,end);ctx.closePath();ctx.clip();ctx.rotate(mid);ctx.translate(labelRadius,0);let turn=Math.PI/2;if(mid>Math.PI/2&&mid<Math.PI*1.5)turn=-Math.PI/2;ctx.rotate(turn);ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineJoin='round';let label=p.name;if(arc<.11)label=String(i+1);const fitted=fitLabel(label,tangentWidth,radialHeight);ctx.font=`900 ${fitted.size}px "Arial Black","PingFang TC",sans-serif`;ctx.strokeStyle='rgba(255,250,225,.95)';ctx.lineWidth=Math.max(3,Math.round(fitted.size*.18));ctx.fillStyle='#24173a';fitted.lines.forEach((line,index)=>{const y=(index-(fitted.lines.length-1)/2)*fitted.lineHeight;ctx.strokeText(line,0,y);ctx.fillText(line,0,y)});ctx.restore()}
function draw(){const size=canvas.width,center=size/2,r=center-13;ctx.clearRect(0,0,size,size);ctx.save();ctx.translate(center,center);prizes.forEach((p,i)=>{const start=-Math.PI/2+p.startDeg*Math.PI/180,end=-Math.PI/2+p.endDeg*Math.PI/180;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,start,end);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.lineWidth=10;ctx.strokeStyle='#24173a';ctx.stroke()});prizes.forEach((p,i)=>drawLabel(p,i,-Math.PI/2+p.startDeg*Math.PI/180,-Math.PI/2+p.endDeg*Math.PI/180,r));ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.lineWidth=17;ctx.strokeStyle='#24173a';ctx.stroke();ctx.restore()}
function beep(f=440,d=.04,v=.04){try{audio??=new(window.AudioContext||window.webkitAudioContext);const o=audio.createOscillator(),g=audio.createGain();o.type='square';o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+d)}catch{}}
function choose(){let r=Math.random(),c=0;for(let i=0;i<prizes.length;i++){c+=prizes[i].probability;if(r<c)return i}return prizes.length-1}
function celebrate(){const p=['#ff4f78','#ffd35a','#55d6be','#62a8ff','#c77dff'];for(let i=0;i<70;i++){const e=document.createElement('i');e.className='confetti';e.style.left=Math.random()*100+'vw';e.style.top=-10-Math.random()*30+'px';e.style.background=p[Math.floor(Math.random()*p.length)];e.style.animationDelay=Math.random()*.5+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),2400)}}
function spin(){if(spinning||prizes.length<2)return;const role=characters[currentCharacter];spinning=true;spinBtn.disabled=updateBtn.disabled=true;characterGrid.querySelectorAll('button').forEach(b=>b.disabled=true);wheelBox.classList.add('is-spinning');helperBubble.textContent=role.start;screen.innerHTML=`${role.name} 正在轉動...<br>GOOD LUCK!`;const winner=prizes[choose()],center=(winner.startDeg+winner.endDeg)/2,target=(360-center)%360,current=((rotation%360)+360)%360,delta=(target-current+360)%360,loops=role.minSpins+Math.floor(Math.random()*(role.maxSpins-role.minSpins+1)),end=rotation+loops*360+delta,start=rotation;setTimeout(()=>{const t0=performance.now();let tick=-1;function frame(now){const p=Math.min((now-t0)/role.duration,1),e=role.ease(p);rotation=start+(end-start)*e;canvas.style.transform=`rotate(${rotation}deg)`;const t=Math.floor(rotation/role.tickStep);if(t!==tick){tick=t;beep(role.baseTone+Math.min(p*240,240),.025,currentCharacter==='bear'?.035:.025)}if(p<1)requestAnimationFrame(frame);else{rotation=end;spinning=false;spinBtn.disabled=updateBtn.disabled=false;characterGrid.querySelectorAll('button').forEach(b=>b.disabled=false);wheelBox.classList.remove('is-spinning');helperBubble.textContent=role.result;screen.innerHTML=`恭喜抽中！<strong>${esc(winner.name)}</strong><small>${role.name}・中獎機率 ${(winner.probability*100).toFixed(2).replace(/\.00$/,'')}%</small>`;beep(currentCharacter==='bear'?523:784,.12,.06);setTimeout(()=>beep(currentCharacter==='rabbit'?1174:988,.16,.06),120);celebrate()}}requestAnimationFrame(frame)},role.windup)}
spinBtn.onclick=spin;updateBtn.onclick=load;characterGrid.addEventListener('click',e=>{const btn=e.target.closest('.character-btn');if(btn)selectCharacter(btn.dataset.character)});addEventListener('keydown',e=>{if(e.code==='Space'&&!e.repeat&&!['TEXTAREA','INPUT','BUTTON'].includes(document.activeElement.tagName)){e.preventDefault();spin()}});selectCharacter(localStorage.getItem('luckyWheelCharacter')||'cat',false);load();
</script>
