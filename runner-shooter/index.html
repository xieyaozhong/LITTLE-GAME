<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Run & Gun</title><style>*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#07111e;color:#fff;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;touch-action:none;user-select:none}body{display:grid;place-items:center}main{position:relative;width:min(100vw,500px);height:100vh;overflow:hidden;background:#8bd9ff;box-shadow:0 0 60px #0008}canvas{width:100%;height:100%;display:block}.hud{position:absolute;z-index:3;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}.pill,.stats{background:#10243ab8;border:2px solid #ffffffa8;border-radius:999px;padding:8px 13px;font-weight:900;text-shadow:0 2px 4px #0008;backdrop-filter:blur(8px)}.stats{position:absolute;z-index:3;top:max(60px,calc(env(safe-area-inset-top) + 58px));left:50%;transform:translateX(-50%);border:0;border-radius:10px;background:#ffffffe6;color:#18314d;padding:6px 10px;font-size:12px;white-space:nowrap}.overlay{position:absolute;z-index:5;inset:0;display:grid;place-items:center;padding:22px;background:linear-gradient(#13476c22,#020c19c9)}.card{width:min(92%,380px);padding:27px 23px;border:2px solid #ffffffaa;border-radius:25px;background:#0a1a2be8;text-align:center;box-shadow:0 24px 70px #0006;backdrop-filter:blur(12px)}h1{margin:0 0 10px;font-size:clamp(31px,9vw,46px)}p{line-height:1.7;color:#ffffffd0}.start{border:0;border-radius:16px;padding:14px 28px;font-size:19px;font-weight:1000;color:#12314c;background:linear-gradient(135deg,#fff28c,#71f6ff);box-shadow:0 12px 32px #60eaff4d}.hide{display:none!important}</style></head><body><main><canvas id="c"></canvas><div class="hud"><div class="pill">金幣 <span id="coin">0</span></div><div class="pill">距離 <span id="dist">0</span>m</div></div><div class="stats" id="stats"></div><div class="overlay" id="start"><div class="card"><h1>RUN &amp; GUN</h1><p>角色會自動前進並持續射擊<br>左右拖曳，打爆數字方塊並選擇升級門</p><button class="start" id="go">開始挑戰</button></div></div><div class="overlay hide" id="over"><div class="card"><h1>挑戰結束</h1><p>距離：<b id="fd">0</b>m<br>金幣：<b id="fc">0</b></p><button class="start" id="again">再玩一次</button></div></div></main><script>
(()=>{'use strict';const C=document.querySelector('#c'),X=C.getContext('2d'),$=s=>document.querySelector(s);let W,H,D=1,on=0,last=0,meters=0,coins=0,speed=22,shot=0,spawn=1,gtime=7,btime=25,shake=0,flash=0,drag=0,B=[],T=[],G=[],P=[],TXT=[],marks=[],clouds=[];const pl={x:0,to:0,hp:3,dmg:1,rate:4.8,n:1,inv:0},maxZ=115,hy=()=>H*.205,py=()=>H*.79,clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t;
function resize(){let r=C.getBoundingClientRect();D=Math.min(devicePixelRatio||1,2);W=r.width;H=r.height;C.width=W*D;C.height=H*D;X.setTransform(D,0,0,D,0,0);marks=Array.from({length:24},(_,i)=>({z:i/24*maxZ,l:i%2?-.34:.34}));clouds=Array.from({length:8},()=>({x:Math.random(),y:Math.random()*.16+.03,s:Math.random()*.7+.55}));draw()}
function proj(x,z){let d=clamp(1-z/maxZ,0,1),q=d**1.45,r=lerp(W*.085,W*.56,q);return{x:W/2+x*r,y:lerp(hy(),py(),q),s:lerp(.18,1.08,q),r,d}}
function hud(){$('#coin').textContent=coins;$('#dist').textContent=meters|0;$('#stats').textContent=`傷害 ${pl.dmg}　射速 ${pl.rate.toFixed(1)}　彈道 ${pl.n}　生命 ${pl.hp}`}
function reset(){meters=coins=0;speed=22;shot=0;spawn=1;gtime=7;btime=25;shake=flash=0;Object.assign(pl,{x:0,to:0,hp:3,dmg:1,rate:4.8,n:1,inv:0});B=[];T=[];G=[];P=[];TXT=[];hud()}
function start(){reset();on=1;last=performance.now();$('#start').classList.add('hide');$('#over').classList.add('hide');requestAnimationFrame(loop)}
function end(){on=0;$('#fd').textContent=meters|0;$('#fc').textContent=coins;$('#over').classList.remove('hide')}
function text(t,x,y,c='#fff',s=25){TXT.push({t,x,y,c,s,l:.8})}function burst(x,y,c,n=18,p=150){for(let i=0;i<n;i++){let a=Math.random()*6.283,v=Math.random()*p+30;P.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,s:Math.random()*5+2,l:Math.random()*.55+.25,c})}}
function target(boss=0){if(boss){let hp=(55+meters*.18)|0;T.push({x:0,z:120,hp,max:hp,size:1.45,boss:1,c:'#7d38df',reward:Math.ceil(hp/3),w:0});return}let lanes=[-.66,0,.66],count=Math.random()<.35?2:1,used=[];for(let i=0;i<count;i++){let x;do{x=lanes[Math.random()*3|0]}while(used.includes(x));used.push(x);let hp=Math.max(3,(5+meters*.045+Math.random()*8)|0),cs=['#ff685d','#ff9f43','#31c8a2','#3e8df6'];T.push({x,z:maxZ+i*4,hp,max:hp,size:Math.random()*.18+.66,boss:0,c:cs[Math.random()*4|0],reward:Math.ceil(hp/4),w:Math.random()*6.28})}}
function gate(){let a=[[['+1 彈道','n',1,'#2cd4ff'],['+1 傷害','dmg',1,'#ffbf31']],[['+35% 射速','rate',.35,'#44e09a'],['+1 生命','hp',1,'#ff668b']],[['+2 傷害','dmg',2,'#ffad2f'],['+1 彈道','n',1,'#39c8ff']]],q=a[Math.random()*a.length|0];G.push({z:maxZ,l:q[0],r:q[1],used:0})}
function shoot(){for(let i=0;i<pl.n;i++)B.push({x:pl.x+(i-(pl.n-1)/2)*.16,z:4,v:68,ok:1})}
function upgrade(o){let[k,v]=[o[1],o[2]];if(k==='n')pl.n=Math.min(5,pl.n+v);if(k==='dmg')pl.dmg+=v;if(k==='rate')pl.rate=Math.min(12,pl.rate*(1+v));if(k==='hp')pl.hp=Math.min(6,pl.hp+v);flash=.25;shake=5;text(o[0],W/2,H*.46,o[3],30);burst(W/2,H*.56,o[3],25,180);hud()}
function update(dt){meters+=speed*dt*.75;speed=Math.min(35,22+meters*.012);pl.inv=Math.max(0,pl.inv-dt);pl.x+= (pl.to-pl.x)*Math.min(1,dt*12);pl.x=clamp(pl.x,-.88,.88);if((shot-=dt)<=0){shoot();shot=1/pl.rate}if((spawn-=dt)<=0){target();spawn=Math.max(.75,1.75-meters*.0015)*(.8+Math.random()*.5)}if((gtime-=dt)<=0){gate();gtime=10+Math.random()*5}if((btime-=dt)<=0){target(1);btime=29+Math.random()*8}marks.forEach(m=>{if((m.z-=speed*dt)<0)m.z+=maxZ});B.forEach(b=>{b.z+=b.v*dt;if(b.z>129)b.ok=0});T.forEach(t=>{t.z-=speed*dt;t.w+=dt*2.2});G.forEach(g=>g.z-=speed*dt);
for(const b of B){if(!b.ok)continue;let hit=null,gap=99;for(const t of T){let dz=Math.abs(b.z-t.z),dx=Math.abs(b.x-t.x),wide=t.boss?.55:.32*t.size;if(dz<3.4&&dx<wide&&dz<gap){hit=t;gap=dz}}if(hit){b.ok=0;hit.hp-=pl.dmg;let p=proj(hit.x,hit.z);burst(p.x,p.y,'#fff28c',4,70);text('-'+pl.dmg,p.x,p.y-12,'#fff',Math.max(14,22*p.s))}}
for(let i=T.length-1;i>=0;i--){let t=T[i];if(t.hp<=0){let p=proj(t.x,t.z);burst(p.x,p.y,t.c,t.boss?50:22,t.boss?250:165);coins+=t.reward;text('+'+t.reward,p.x,p.y-20,'#ffe45b',t.boss?35:24);shake=t.boss?13:5;T.splice(i,1);hud();continue}if(t.z<=1.5){if(Math.abs(t.x-pl.x)<(t.boss?.62:.37*t.size)&&pl.inv<=0){pl.hp--;pl.inv=1.1;shake=14;flash=.32;let p=proj(pl.x,0);burst(p.x,py()-25,'#ff4f4f',28,210);text('-1 生命',p.x,py()-70,'#ff5555',28);hud();if(pl.hp<=0){end();return}}T.splice(i,1)}}
for(let i=G.length-1;i>=0;i--){let g=G[i];if(g.z<=2&&!g.used){g.used=1;upgrade(pl.x<0?g.l:g.r)}if(g.z<-5)G.splice(i,1)}B=B.filter(b=>b.ok);P.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.97;p.vy*=.97;p.l-=dt});P=P.filter(p=>p.l>0);TXT.forEach(t=>{t.y-=45*dt;t.l-=dt});TXT=TXT.filter(t=>t.l>0);shake*=.83;flash=Math.max(0,flash-dt);hud()}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);X.beginPath();X.roundRect?X.roundRect(x,y,w,h,r):(X.rect(x,y,w,h));}
function sky(){let g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#65c9ff');g.addColorStop(.45,'#bcecff');g.addColorStop(.46,'#8acb7e');g.addColorStop(1,'#3d8a4d');X.fillStyle=g;X.fillRect(0,0,W,H);X.fillStyle='#fff297e8';X.beginPath();X.arc(W*.78,H*.1,W*.085,0,6.283);X.fill();X.fillStyle='#ffffffd2';clouds.forEach(c=>{let x=c.x*W,y=c.y*H,s=c.s*W*.05;X.beginPath();X.arc(x,y,s,0,6.283);X.arc(x+s,y+s*.1,s*.8,0,6.283);X.arc(x-s,y+s*.18,s*.65,0,6.283);X.fill()});X.fillStyle='#4f9d69';X.beginPath();X.moveTo(0,H*.33);for(let i=0;i<=8;i++)X.lineTo(i/8*W,H*(.2+(i%2?.1:.04)));X.lineTo(W,H*.5);X.lineTo(0,H*.5);X.fill()}
function road(){let y=hy(),bot=py()+H*.19;X.fillStyle='#53aa56';X.fillRect(0,y,W,H-y);X.fillStyle='#4e5966';X.beginPath();X.moveTo(W*.43,y);X.lineTo(W*.97,bot);X.lineTo(W*.03,bot);X.lineTo(W*.57,y);X.fill();X.strokeStyle='#fff';X.lineWidth=4;X.beginPath();X.moveTo(W*.43,y);X.lineTo(W*.03,bot);X.moveTo(W*.57,y);X.lineTo(W*.97,bot);X.stroke();marks.forEach(m=>{let a=proj(m.l,m.z),b=proj(m.l,Math.min(maxZ,m.z+7));X.strokeStyle='#ffffffd0';X.lineWidth=Math.max(1,6*a.s);X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);X.stroke()})}
function dGate(g){let p=proj(0,g.z);if(!p.d)return;let fw=p.r*1.72,gap=5*p.s,h=115*p.s,y=p.y-h,hw=fw/2-gap;function side(x,o){X.save();X.globalAlpha=.9;X.fillStyle=o[3];X.shadowBlur=12*p.s;X.shadowColor=o[3];rr(x,y,hw,h,10*p.s);X.fill();X.shadowBlur=0;X.fillStyle='#ffffffe8';rr(x+4*p.s,y+4*p.s,hw-8*p.s,h-8*p.s,8*p.s);X.fill();X.fillStyle=o[3];X.textAlign='center';X.font=`900 ${Math.max(10,20*p.s)}px system-ui`;X.fillText(o[0],x+hw/2,y+h*.58);X.restore()}side(W/2-fw/2,g.l);side(W/2+gap,g.r)}
function dTarget(t){let p=proj(t.x,t.z);if(!p.d)return,s=72*t.size*p.s,y=p.y-s*.65;X.save();X.translate(p.x,y);X.fillStyle=t.c;X.shadowBlur=18*p.s;X.shadowColor=t.c;rr(-s/2,-s/2,s,s,12*p.s);X.fill();X.shadowBlur=0;X.fillStyle='#ffffff42';rr(-s*.41,-s*.4,s*.82,s*.28,8*p.s);X.fill();X.fillStyle='#fff';X.textAlign='center';X.textBaseline='middle';X.font=`1000 ${Math.max(12,(t.boss?34:28)*p.s)}px system-ui`;X.fillText(Math.max(0,Math.ceil(t.hp)),0,4*p.s);if(t.boss){X.fillStyle='#2d123f';rr(-s*.48,-s*.72,s*.96,8*p.s,4*p.s);X.fill();X.fillStyle='#5dff9a';rr(-s*.48,-s*.72,s*.96*t.hp/t.max,8*p.s,4*p.s);X.fill()}X.restore()}
function dBullet(b){let p=proj(b.x,b.z);if(!p.d)return;X.save();X.fillStyle='#fff86e';X.shadowBlur=13;X.shadowColor='#ffe800';X.beginPath();X.arc(p.x,p.y-10*p.s,Math.max(2,6*p.s),0,6.283);X.fill();X.restore()}
function dPlayer(){if(pl.inv>0&&(pl.inv*14|0)%2===0)return;let p=proj(pl.x,0),y=py(),s=Math.min(W/420,H/760);X.save();X.translate(p.x,y);X.fillStyle='#0000003d';X.beginPath();X.ellipse(0,30*s,33*s,11*s,0,0,6.283);X.fill();X.fillStyle='#ffcc59';rr(-19*s,-35*s,38*s,58*s,12*s);X.fill();X.fillStyle='#ffd6b1';X.beginPath();X.arc(0,-52*s,19*s,0,6.283);X.fill();X.fillStyle='#2775e8';X.beginPath();X.arc(0,-57*s,20*s,3.14,6.283);X.fill();X.fillStyle='#243448';rr(-8*s,-30*s,16*s,40*s,5*s);X.fill();X.fillStyle='#50d7ff';X.fillRect(-5*s,-40*s,10*s,16*s);let st=Math.sin(performance.now()*.018)*8*s;X.strokeStyle='#22324a';X.lineWidth=8*s;X.lineCap='round';X.beginPath();X.moveTo(-8*s,17*s);X.lineTo(-10*s-st,35*s);X.moveTo(8*s,17*s);X.lineTo(10*s+st,35*s);X.stroke();X.restore()}
function draw(){X.save();if(shake>.2)X.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);sky();road();let a=[...G.map(v=>({z:v.z,k:0,v})),...T.map(v=>({z:v.z,k:1,v})),...B.map(v=>({z:v.z,k:2,v}))].sort((a,b)=>b.z-a.z);a.forEach(o=>o.k===0?dGate(o.v):o.k===1?dTarget(o.v):dBullet(o.v));dPlayer();P.forEach(p=>{X.save();X.globalAlpha=clamp(p.l*2,0,1);X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.s,0,6.283);X.fill();X.restore()});TXT.forEach(t=>{X.save();X.globalAlpha=clamp(t.l*1.5,0,1);X.fillStyle=t.c;X.strokeStyle='#0008';X.lineWidth=4;X.textAlign='center';X.font=`1000 ${t.s}px system-ui`;X.strokeText(t.t,t.x,t.y);X.fillText(t.t,t.x,t.y);X.restore()});if(flash){X.fillStyle=`rgba(255,255,255,${flash})`;X.fillRect(0,0,W,H)}X.restore()}
function loop(n){if(!on)return;let dt=Math.min((n-last)/1000,.034);last=n;update(dt);draw();if(on)requestAnimationFrame(loop)}function pointer(x){let r=C.getBoundingClientRect();pl.to=clamp(((x-r.left)/r.width-.5)*2,-.88,.88)}C.onpointerdown=e=>{drag=1;C.setPointerCapture(e.pointerId);pointer(e.clientX)};C.onpointermove=e=>drag&&pointer(e.clientX);C.onpointerup=()=>drag=0;addEventListener('keydown',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')pl.to-=.18;if(e.code==='ArrowRight'||e.code==='KeyD')pl.to+=.18;pl.to=clamp(pl.to,-.88,.88)});$('#go').onclick=$('#again').onclick=start;addEventListener('resize',resize);resize()})();
</script></body></html>
