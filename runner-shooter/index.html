<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Run & Gun</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111e;color:#fff;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;touch-action:none;user-select:none}main{position:relative;width:min(100vw,500px);height:100vh;margin:auto;overflow:hidden;background:#8edcff}canvas{width:100%;height:100%;display:block}.hud{position:absolute;z-index:2;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}.pill,.stats{background:#10243abb;border:2px solid #ffffffaa;border-radius:999px;padding:8px 13px;font-weight:900;text-shadow:0 2px 4px #0008}.stats{position:absolute;z-index:2;top:max(60px,calc(env(safe-area-inset-top) + 58px));left:50%;transform:translateX(-50%);border:0;border-radius:10px;background:#ffffffe8;color:#18314d;font-size:12px;white-space:nowrap}.overlay{position:absolute;z-index:5;inset:0;display:grid;place-items:center;padding:22px;background:linear-gradient(#13476c22,#020c19cc)}.card{width:min(92%,380px);padding:27px 23px;border:2px solid #ffffffaa;border-radius:25px;background:#0a1a2bea;text-align:center;box-shadow:0 24px 70px #0006}.card h1{margin:0 0 10px;font-size:clamp(31px,9vw,46px)}.card p{line-height:1.7;color:#ffffffd4}.btn{border:0;border-radius:16px;padding:14px 28px;font-size:19px;font-weight:1000;color:#12314c;background:linear-gradient(135deg,#fff28c,#71f6ff)}.hide{display:none!important}</style></head><body><main><canvas id="game"></canvas><div class="hud"><div class="pill">金幣 <span id="coins">0</span></div><div class="pill">距離 <span id="distance">0</span>m</div></div><div class="stats" id="stats"></div><div class="overlay" id="start"><div class="card"><h1>RUN &amp; GUN</h1><p>角色會自動前進並持續射擊<br>左右拖曳，打爆數字方塊並選擇升級門</p><button class="btn" id="play">開始挑戰</button></div></div><div class="overlay hide" id="over"><div class="card"><h1>挑戰結束</h1><p>距離：<b id="finalDistance">0</b>m<br>金幣：<b id="finalCoins">0</b></p><button class="btn" id="again">再玩一次</button></div></div></main><script>
(function(){'use strict';
var canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=0,H=0,D=1,running=false,last=0,distance=0,coins=0,speed=23,shotTimer=0,spawnTimer=0,gateTimer=8,bossTimer=25,dragging=false,blocks=[],bullets=[],gates=[],particles=[],texts=[];
var player={x:0,target:0,hp:3,damage:1,rate:5,count:1,inv:0};
function el(id){return document.getElementById(id)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function mix(a,b,t){return a+(b-a)*t}
function resize(){var r=canvas.getBoundingClientRect();D=Math.min(window.devicePixelRatio||1,2);W=r.width;H=r.height;canvas.width=Math.round(W*D);canvas.height=Math.round(H*D);ctx.setTransform(D,0,0,D,0,0);draw()}
function project(x,z){var d=clamp(1-z/110,0,1),q=Math.pow(d,1.45),half=mix(W*.08,W*.55,q);return{x:W/2+x*half,y:mix(H*.2,H*.8,q),s:mix(.18,1.08,q),d:d,half:half}}
function rounded(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function hud(){el('coins').textContent=coins;el('distance').textContent=Math.floor(distance);el('stats').textContent='傷害 '+player.damage+'　射速 '+player.rate.toFixed(1)+'　彈道 '+player.count+'　生命 '+player.hp}
function reset(){distance=coins=0;speed=23;shotTimer=0;spawnTimer=.8;gateTimer=7;bossTimer=24;blocks=[];bullets=[];gates=[];particles=[];texts=[];player.x=player.target=0;player.hp=3;player.damage=1;player.rate=5;player.count=1;player.inv=0;hud()}
function start(){reset();running=true;last=performance.now();el('start').classList.add('hide');el('over').classList.add('hide');requestAnimationFrame(loop)}
function end(){running=false;el('finalDistance').textContent=Math.floor(distance);el('finalCoins').textContent=coins;el('over').classList.remove('hide')}
function pop(text,x,y,color,size){texts.push({text:text,x:x,y:y,color:color||'#fff',size:size||24,life:.8})}
function burst(x,y,color,n){for(var i=0;i<(n||18);i++){var a=Math.random()*Math.PI*2,v=Math.random()*170+30;particles.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,size:Math.random()*4+2,life:Math.random()*.5+.25,color:color})}}
function spawn(boss){if(boss){var hp=Math.floor(50+distance*.2);blocks.push({x:0,z:112,hp:hp,max:hp,size:1.45,boss:true,color:'#813ee5',reward:20});return}var lanes=[-.66,0,.66],count=Math.random()<.3?2:1,used={};for(var i=0;i<count;i++){var x;do{x=lanes[Math.floor(Math.random()*3)]}while(used[x]);used[x]=1;var hp=Math.max(3,Math.floor(5+distance*.045+Math.random()*8)),colors=['#ff685d','#ff9f43','#31c8a2','#3e8df6'];blocks.push({x:x,z:110+i*4,hp:hp,max:hp,size:.7+Math.random()*.16,boss:false,color:colors[Math.floor(Math.random()*4)],reward:Math.ceil(hp/4)})}}
function spawnGate(){var sets=[[['+1 彈道','count',1,'#2cd4ff'],['+1 傷害','damage',1,'#ffbf31']],[['+35% 射速','rate',.35,'#44e09a'],['+1 生命','hp',1,'#ff668b']],[['+2 傷害','damage',2,'#ffad2f'],['+1 彈道','count',1,'#39c8ff']]],pair=sets[Math.floor(Math.random()*sets.length)];gates.push({z:110,left:pair[0],right:pair[1],used:false})}
function fire(){for(var i=0;i<player.count;i++)bullets.push({x:player.x+(i-(player.count-1)/2)*.16,z:3,alive:true})}
function upgrade(o){if(o[1]==='count')player.count=Math.min(5,player.count+o[2]);if(o[1]==='damage')player.damage+=o[2];if(o[1]==='rate')player.rate=Math.min(12,player.rate*(1+o[2]));if(o[1]==='hp')player.hp=Math.min(6,player.hp+o[2]);pop(o[0],W/2,H*.46,o[3],30);burst(W/2,H*.55,o[3],28);hud()}
function update(dt){distance+=speed*dt*.75;speed=Math.min(35,23+distance*.012);player.inv=Math.max(0,player.inv-dt);player.x+=(player.target-player.x)*Math.min(1,dt*12);player.x=clamp(player.x,-.88,.88);shotTimer-=dt;if(shotTimer<=0){fire();shotTimer=1/player.rate}spawnTimer-=dt;if(spawnTimer<=0){spawn(false);spawnTimer=Math.max(.75,1.7-distance*.0015)*(.8+Math.random()*.45)}gateTimer-=dt;if(gateTimer<=0){spawnGate();gateTimer=10+Math.random()*5}bossTimer-=dt;if(bossTimer<=0){spawn(true);bossTimer=30+Math.random()*7}
for(var i=0;i<bullets.length;i++){bullets[i].z+=70*dt;if(bullets[i].z>125)bullets[i].alive=false}for(i=0;i<blocks.length;i++)blocks[i].z-=speed*dt;for(i=0;i<gates.length;i++)gates[i].z-=speed*dt;
for(i=0;i<bullets.length;i++){var b=bullets[i];if(!b.alive)continue;for(var j=0;j<blocks.length;j++){var t=blocks[j],wide=t.boss ? .55 : .32*t.size;if(Math.abs(b.z-t.z)<3.5&&Math.abs(b.x-t.x)<wide){b.alive=false;t.hp-=player.damage;var pp=project(t.x,t.z);pop('-'+player.damage,pp.x,pp.y-10,'#fff',18);break}}}
for(i=blocks.length-1;i>=0;i--){var t=blocks[i];if(t.hp<=0){var p=project(t.x,t.z);burst(p.x,p.y,t.color,t.boss?45:22);coins+=t.reward;pop('+'+t.reward,p.x,p.y-20,'#ffe45b',t.boss?34:24);blocks.splice(i,1);hud();continue}if(t.z<=1.5){var hitWidth=t.boss ? .62 : .37*t.size;if(Math.abs(t.x-player.x)<hitWidth&&player.inv<=0){player.hp--;player.inv=1;var ph=project(player.x,0);burst(ph.x,H*.78,'#ff4f4f',28);pop('-1 生命',ph.x,H*.7,'#ff5555',28);hud();if(player.hp<=0){end();return}}blocks.splice(i,1)}}
for(i=gates.length-1;i>=0;i--){var g=gates[i];if(g.z<=2&&!g.used){g.used=true;upgrade(player.x<0?g.left:g.right)}if(g.z<-5)gates.splice(i,1)}bullets=bullets.filter(function(x){return x.alive});for(i=particles.length-1;i>=0;i--){var q=particles[i];q.x+=q.vx*dt;q.y+=q.vy*dt;q.vx*=.97;q.vy*=.97;q.life-=dt;if(q.life<=0)particles.splice(i,1)}for(i=texts.length-1;i>=0;i--){texts[i].y-=45*dt;texts[i].life-=dt;if(texts[i].life<=0)texts.splice(i,1)}}
function drawSky(){var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#65c9ff');g.addColorStop(.45,'#bcecff');g.addColorStop(.46,'#82c878');g.addColorStop(1,'#3e8d4c');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff297';ctx.beginPath();ctx.arc(W*.78,H*.1,W*.08,0,Math.PI*2);ctx.fill()}
function drawRoad(){var y=H*.2,b=H*.99;ctx.fillStyle='#4e5966';ctx.beginPath();ctx.moveTo(W*.43,y);ctx.lineTo(W*.97,b);ctx.lineTo(W*.03,b);ctx.lineTo(W*.57,y);ctx.closePath();ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(W*.43,y);ctx.lineTo(W*.03,b);ctx.moveTo(W*.57,y);ctx.lineTo(W*.97,b);ctx.stroke();for(var z=(distance*2)%12;z<110;z+=12){for(var lane=-1;lane<=1;lane+=2){var a=project(lane*.34,z),c=project(lane*.34,Math.min(110,z+5));ctx.strokeStyle='#ffffffd0';ctx.lineWidth=Math.max(1,5*a.s);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(c.x,c.y);ctx.stroke()}}}
function drawBlock(t){var p=project(t.x,t.z);if(!p.d)return;var s=72*t.size*p.s,y=p.y-s*.65;ctx.save();ctx.translate(p.x,y);ctx.fillStyle=t.color;ctx.shadowBlur=16*p.s;ctx.shadowColor=t.color;rounded(-s/2,-s/2,s,s,10*p.s);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='900 '+Math.max(12,(t.boss?34:28)*p.s)+'px system-ui';ctx.fillText(Math.max(0,Math.ceil(t.hp)),0,3*p.s);ctx.restore()}
function drawGate(g){var p=project(0,g.z);if(!p.d)return;var full=p.half*1.72,gap=5*p.s,h=110*p.s,y=p.y-h,half=full/2-gap;function side(x,o){ctx.fillStyle=o[3];rounded(x,y,half,h,9*p.s);ctx.fill();ctx.fillStyle='#ffffffea';rounded(x+4*p.s,y+4*p.s,half-8*p.s,h-8*p.s,7*p.s);ctx.fill();ctx.fillStyle=o[3];ctx.textAlign='center';ctx.font='900 '+Math.max(9,18*p.s)+'px system-ui';ctx.fillText(o[0],x+half/2,y+h*.58)}side(W/2-full/2,g.left);side(W/2+gap,g.right)}
function drawPlayer(){if(player.inv>0&&Math.floor(player.inv*14)%2===0)return;var p=project(player.x,0),s=Math.min(W/420,H/760),y=H*.8;ctx.save();ctx.translate(p.x,y);ctx.fillStyle='#0004';ctx.beginPath();ctx.ellipse(0,30*s,32*s,10*s,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcb59';rounded(-19*s,-35*s,38*s,58*s,12*s);ctx.fill();ctx.fillStyle='#ffd6b1';ctx.beginPath();ctx.arc(0,-52*s,19*s,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2775e8';ctx.beginPath();ctx.arc(0,-57*s,20*s,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='#243448';rounded(-8*s,-31*s,16*s,42*s,5*s);ctx.fill();ctx.restore()}
function draw(){drawSky();drawRoad();var all=[];gates.forEach(function(v){all.push({z:v.z,k:0,v:v})});blocks.forEach(function(v){all.push({z:v.z,k:1,v:v})});bullets.forEach(function(v){all.push({z:v.z,k:2,v:v})});all.sort(function(a,b){return b.z-a.z});all.forEach(function(o){if(o.k===0)drawGate(o.v);else if(o.k===1)drawBlock(o.v);else{var p=project(o.v.x,o.v.z);ctx.fillStyle='#fff86e';ctx.beginPath();ctx.arc(p.x,p.y,Math.max(2,5*p.s),0,Math.PI*2);ctx.fill()}});drawPlayer();particles.forEach(function(p){ctx.globalAlpha=clamp(p.life*2,0,1);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;texts.forEach(function(t){ctx.globalAlpha=clamp(t.life*1.5,0,1);ctx.fillStyle=t.color;ctx.strokeStyle='#0008';ctx.lineWidth=4;ctx.textAlign='center';ctx.font='900 '+t.size+'px system-ui';ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y)});ctx.globalAlpha=1}
function loop(now){if(!running)return;var dt=Math.min((now-last)/1000,.034);last=now;update(dt);draw();if(running)requestAnimationFrame(loop)}
function point(x){var r=canvas.getBoundingClientRect();player.target=clamp(((x-r.left)/r.width-.5)*2,-.88,.88)}canvas.addEventListener('pointerdown',function(e){dragging=true;if(canvas.setPointerCapture)canvas.setPointerCapture(e.pointerId);point(e.clientX)});canvas.addEventListener('pointermove',function(e){if(dragging)point(e.clientX)});canvas.addEventListener('pointerup',function(){dragging=false});window.addEventListener('keydown',function(e){if(e.code==='ArrowLeft'||e.code==='KeyA')player.target-=.18;if(e.code==='ArrowRight'||e.code==='KeyD')player.target+=.18;player.target=clamp(player.target,-.88,.88)});el('play').onclick=start;el('again').onclick=start;window.addEventListener('resize',resize);resize();hud();
})();
</script></body></html>
