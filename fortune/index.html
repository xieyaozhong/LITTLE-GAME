<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f6a9c8">
<title>桃桃神籤｜像素占卜</title>
<style>
:root{--ink:#57364a;--pink:#f39abc;--deep:#d65d8c;--cream:#fff4d8;--paper:#fffdf3;--gold:#ffd166;--red:#ec6378}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:"PingFang TC","Noto Sans TC",system-ui,sans-serif;color:var(--ink)}
body{min-height:100dvh;padding:max(14px,env(safe-area-inset-top)) 14px max(20px,env(safe-area-inset-bottom));background:linear-gradient(90deg,#ffffff22 1px,transparent 1px),linear-gradient(#ffffff22 1px,transparent 1px),linear-gradient(#f7b4cf 0 68%,#f2d7a8 68%);background-size:16px 16px,16px 16px,auto}
.app{width:min(100%,460px);min-height:calc(100dvh - 34px);margin:auto;display:flex;flex-direction:column;align-items:center}.box{border:4px solid var(--ink);border-radius:9px;box-shadow:4px 5px 0 #a85e82}
header{width:100%;padding:11px;text-align:center;background:#fff3d9ed}h1{margin:0;color:var(--deep);font-size:clamp(24px,7vw,32px);text-shadow:2px 2px #fff}.sub{margin:4px 0 0;font-size:13px;font-weight:800}
.scene{flex:1;width:100%;min-height:470px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative}.star{position:absolute;color:var(--gold);font-size:27px;text-shadow:2px 2px var(--ink);animation:float 2.5s ease-in-out infinite}.s1{top:12%;left:8%}.s2{top:23%;right:9%;animation-delay:-1s}@keyframes float{50%{transform:translateY(-8px) rotate(8deg)}}
.cat{width:92px;height:66px;position:relative;margin-bottom:5px}.head{position:absolute;left:12px;top:10px;width:68px;height:54px;background:#fff9eb;border:4px solid var(--ink);border-radius:10px;box-shadow:4px 4px #0002}.ear{position:absolute;top:-12px;width:24px;height:26px;background:#fff9eb;border:4px solid var(--ink);border-radius:5px;z-index:-1}.el{left:3px;transform:rotate(-12deg)}.er{right:3px;transform:rotate(12deg)}.eye{position:absolute;top:21px;width:6px;height:8px;background:var(--ink)}.eye.l{left:17px}.eye.r{right:17px}.mouth{position:absolute;left:28px;top:34px;width:11px;height:7px;border-bottom:3px solid var(--ink);border-radius:50%}.cheek{position:absolute;top:34px;width:10px;height:6px;background:#ffb6cd;border-radius:50%}.cheek.l{left:5px}.cheek.r{right:5px}
.potwrap{width:230px;height:280px;position:relative;display:grid;place-items:end center;transform-origin:50% 85%}.sticks{position:absolute;top:0;left:38px;width:154px;height:180px;transform-origin:50% 95%}.stick{position:absolute;left:67px;bottom:0;width:20px;height:170px;background:#f2c775;border:4px solid var(--ink);border-radius:4px;transform-origin:50% 100%;box-shadow:3px 3px #0002}.stick:after{content:attr(data-x);position:absolute;top:12px;left:50%;transform:translateX(-50%);color:var(--red);font-weight:900}.stick:nth-child(1){transform:rotate(-18deg) translateY(10px)}.stick:nth-child(2){transform:rotate(-10deg)}.stick:nth-child(3){transform:rotate(-3deg) translateY(8px)}.stick:nth-child(4){transform:rotate(5deg)}.stick:nth-child(5){transform:rotate(12deg) translateY(7px)}.stick:nth-child(6){transform:rotate(19deg)}
.pot{width:184px;height:157px;position:relative;background:#eb7089;border:5px solid var(--ink);border-radius:18px 18px 38px 38px;box-shadow:0 8px #bd536d,5px 11px #0002}.pot:before{content:"";position:absolute;left:-12px;top:-17px;width:198px;height:27px;background:#ffc2d0;border:5px solid var(--ink);border-radius:8px}.label{position:absolute;left:50%;top:47px;transform:translateX(-50%);width:86px;height:73px;display:grid;place-items:center;background:var(--paper);border:4px solid var(--ink);font-size:34px;font-weight:900;color:var(--red);box-shadow:4px 4px #0002}
.shake .pot,.shake .sticks{animation:shake .11s linear infinite}@keyframes shake{0%{transform:rotate(-4deg) translateX(-4px)}50%{transform:rotate(4deg) translateX(4px)}100%{transform:rotate(-4deg) translateX(-4px)}}
.tip{text-align:center;font-weight:900;line-height:1.5;margin:4px 0 10px;min-height:46px}.status{display:inline-block;padding:4px 8px;background:var(--cream);border:3px solid var(--ink);border-radius:6px;font-size:12px;box-shadow:3px 3px #0002}
.controls{width:100%;display:grid;gap:10px}button{font:inherit;color:var(--ink);font-weight:900;cursor:pointer}.main,.small,.again{border:4px solid var(--ink);border-radius:8px}.main{padding:14px;background:var(--pink);font-size:18px;box-shadow:0 6px var(--deep)}.small{padding:10px;background:var(--cream);box-shadow:0 5px #d7b979}.main:active,.small:active,.again:active{transform:translateY(4px);box-shadow:none}footer{font-size:11px;font-weight:700;text-align:center;padding:10px 0 0;opacity:.75}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;background:#46283999;backdrop-filter:blur(3px);z-index:20}.modal.show{display:flex}.card{width:min(100%,400px);max-height:88dvh;overflow:auto;position:relative;padding:17px;background:var(--paper);animation:pop .25s ease-out}@keyframes pop{from{transform:scale(.84);opacity:0}}.close{position:absolute;right:8px;top:8px;width:35px;height:35px;border:3px solid var(--ink);border-radius:5px;background:white}.rank{text-align:center;font-size:31px;font-weight:900;color:var(--red);text-shadow:2px 2px #ffd4df}.no{text-align:center;font-weight:800;font-size:13px}.title{text-align:center;font-size:20px}.poem{padding:11px;background:var(--cream);border:3px dashed var(--deep);text-align:center;font-weight:900;line-height:1.8;white-space:pre-line}.msg{line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.item{padding:9px;border:3px solid var(--ink);border-radius:6px;background:white;font-size:13px;line-height:1.45}.item b{display:block;color:var(--deep);margin-bottom:4px}.lucky{margin:11px 0;padding:9px;border:3px solid var(--ink);border-radius:6px;background:#e6f7ed;text-align:center;font-weight:900;line-height:1.6}.again{width:100%;padding:11px;background:var(--gold);box-shadow:0 5px #d1a43b}
.spark{position:fixed;z-index:30;pointer-events:none;font-size:22px;animation:burst .9s ease-out forwards}@keyframes burst{to{opacity:0;transform:translate(var(--x),var(--y)) rotate(180deg) scale(1.5)}}
@media(max-height:700px){.scene{min-height:410px}.potwrap{transform:scale(.82);margin:-25px 0}.cat{transform:scale(.85)}}
</style>
</head>
<body>
<main class="app">
<header class="box"><h1>桃桃神籤</h1><p class="sub">搖一搖，抽出今天的像素運勢</p></header>
<section class="scene"><span class="star s1">✦</span><span class="star s2">✧</span>
<div class="cat"><i class="ear el"></i><i class="ear er"></i><div class="head"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i><i class="cheek l"></i><i class="cheek r"></i></div></div>
<div class="potwrap" id="pot"><div class="sticks"><i class="stick" data-x="吉"></i><i class="stick" data-x="福"></i><i class="stick" data-x="運"></i><i class="stick" data-x="緣"></i><i class="stick" data-x="星"></i><i class="stick" data-x="願"></i></div><div class="pot"><div class="label">籤</div></div></div>
<div class="tip"><div id="tip">先開啟搖動功能，再輕輕搖晃手機</div><span class="status" id="status">尚未開啟感測</span></div></section>
<section class="controls"><button class="main" id="motion">📱 開啟手機搖籤</button><button class="small" id="draw">✨ 點我直接抽一支</button></section>
<footer>占卜僅供娛樂與自我整理，不代替專業建議。</footer></main>
<div class="modal" id="modal"><article class="card box"><button class="close" id="close">✕</button><div class="rank" id="rank"></div><div class="no" id="no"></div><h2 class="title" id="title"></h2><div class="poem" id="poem"></div><p class="msg" id="msg"></p><div class="grid"><div class="item"><b>💗 感情</b><span id="love"></span></div><div class="item"><b>💰 財運</b><span id="money"></span></div><div class="item"><b>📚 工作／學業</b><span id="work"></span></div><div class="item"><b>🌿 健康</b><span id="health"></span></div></div><div class="lucky" id="lucky"></div><button class="again" id="again">再抽一次</button></article></div>
<script>
const F=[
{r:"大吉",t:"星光正落在你的路上",p:"晨風輕動花先笑\n一念澄明萬事開",m:"最近的努力開始累積成看得見的成果。穩穩往前，比一次做完所有事情更容易遇見好機會。",l:"坦率表達會得到溫柔回應。",n:"正財穩定，小驚喜可期。",w:"適合提案、面試與開始新計畫。",h:"精神回升，記得補水與睡飽。",c:"蜜桃粉",d:"8",q:"東南方"},
{r:"大吉",t:"願望正在悄悄發芽",p:"春雨無聲潤小芽\n回頭已見滿庭花",m:"你以為沒有進展的事情，其實正在暗處慢慢成形。保持耐心，今天適合完成一件拖延已久的小事。",l:"持續的關心比華麗承諾更有效。",n:"適合儲蓄與長期規劃。",w:"練習與作品整理都有收穫。",h:"留意肩頸與眼睛疲勞。",c:"嫩芽綠",d:"3",q:"東方"},
{r:"中吉",t:"雲會散，路也會亮",p:"雲遮明月非無月\n潮退方知石上光",m:"眼前的卡關不是失敗，而是提醒你換一種方法。把問題拆小，局勢就會開始鬆動。",l:"少猜測，直接而溫和地表達感受。",n:"適合比價與整理支出。",w:"小延誤後仍能順利完成。",h:"散步或提早休息很有幫助。",c:"天空藍",d:"6",q:"西方"},
{r:"中吉",t:"慢一點，反而先抵達",p:"石階一步通高處\n莫把匆忙當遠行",m:"今天最重要的不是速度，而是方向。確認自己正在做正確的事，再穩定向前。",l:"穩定陪伴會增加安全感。",n:"大型消費隔一天再決定。",w:"適合校正、除錯與修改細節。",h:"避免久坐，安排短暫活動。",c:"奶油黃",d:"4",q:"北方"},
{r:"小吉",t:"一杯溫柔就能轉運",p:"微光雖小能穿夜\n一語溫柔可解愁",m:"今天的好運藏在微小互動裡。對自己與他人多一點體諒，緊繃的事情會出現新的空間。",l:"一句真心稱讚會帶來好氣氛。",n:"避免情緒購物。",w:"有人願意幫忙，別怕詢問。",h:"飲食清淡、慢慢吃。",c:"薰衣草紫",d:"2",q:"西北方"},
{r:"末吉",t:"先整理，再出發",p:"亂線耐心終可解\n空杯洗淨好盛茶",m:"事情看起來雜亂，但並沒有失控。先整理資料、帳務或心情，清晰感會帶回掌控力。",l:"重要話題留到心情平穩時談。",n:"暫緩非必要消費。",w:"先排除錯誤與遺漏。",h:"補充水分並讓眼睛休息。",c:"茶褐色",d:"1",q:"東北方"}
];
const $=x=>document.getElementById(x),pot=$("pot"),modal=$("modal");let busy=false,on=false,last=0,prev={x:0,y:0,z:0},audio;
function beep(){try{audio=audio||new(AudioContext||webkitAudioContext);[660,784,988].forEach((f,i)=>{let o=audio.createOscillator(),g=audio.createGain(),t=audio.currentTime+i*.08;o.type="square";o.frequency.value=f;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.05,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+.15);o.connect(g).connect(audio.destination);o.start(t);o.stop(t+.16)})}catch(e){}}
function burst(){for(let i=0;i<16;i++){let s=document.createElement("i");s.className="spark";s.textContent=["✦","✧","♡","★"][Math.random()*4|0];s.style.left=48+Math.random()*8+"vw";s.style.top=45+Math.random()*8+"vh";s.style.setProperty("--x",(Math.random()-.5)*260+"px");s.style.setProperty("--y",(Math.random()-.7)*260+"px");document.body.append(s);setTimeout(()=>s.remove(),950)}}
function pick(){let x=Math.random(),r=x<.24?"大吉":x<.58?"中吉":x<.86?"小吉":"末吉",a=F.filter(f=>f.r===r);return a[Math.random()*a.length|0]||F[Math.random()*F.length|0]}
function show(f){$("rank").textContent=f.r;$("no").textContent="第 "+String(Math.random()*100+1|0).padStart(2,"0")+" 籤";$("title").textContent=f.t;$("poem").textContent=f.p;$("msg").textContent=f.m;$("love").textContent=f.l;$("money").textContent=f.n;$("work").textContent=f.w;$("health").textContent=f.h;$("lucky").innerHTML=`幸運色：${f.c}　｜　幸運數字：${f.d}<br>幸運方位：${f.q}`;modal.classList.add("show");document.body.style.overflow="hidden"}
function draw(){if(busy||modal.classList.contains("show"))return;busy=true;$("tip").textContent="籤筒搖動中……請默念你的問題";pot.classList.add("shake");navigator.vibrate?.([60,35,60,35,90]);setTimeout(()=>{pot.classList.remove("shake");show(pick());beep();burst();navigator.vibrate?.([100,60,140]);$("tip").textContent=on?"再搖一次，也可以重新抽籤":"點擊按鈕可以再抽一次";busy=false},1200)}
function close(){modal.classList.remove("show");document.body.style.overflow=""}
function move(e){let a=e.accelerationIncludingGravity||e.acceleration;if(!a||busy||modal.classList.contains("show"))return;let x=a.x||0,y=a.y||0,z=a.z||0,v=Math.hypot(x-prev.x,y-prev.y,z-prev.z);prev={x,y,z};let t=Date.now();if(v>15&&t-last>1400){last=t;draw()}}
async function enable(){try{if(typeof DeviceMotionEvent!=="undefined"&&typeof DeviceMotionEvent.requestPermission==="function"&&await DeviceMotionEvent.requestPermission()!=="granted")throw 0;if(!("DeviceMotionEvent"in window))throw 0;addEventListener("devicemotion",move,{passive:true});on=true;$("status").textContent="已開啟，請搖一搖 ✨";$("status").style.background="#e6f7ed";$("tip").textContent="握穩手機，輕輕上下搖動即可抽籤";$("motion").textContent="✅ 手機搖籤已開啟";$("motion").disabled=true;navigator.vibrate?.(50)}catch(e){$("status").textContent="無法開啟感測";$("tip").textContent="請使用 HTTPS 開啟，或改用點擊抽籤"}}
$("motion").onclick=enable;$("draw").onclick=draw;$("close").onclick=close;$("again").onclick=()=>{close();setTimeout(draw,160)};modal.onclick=e=>{if(e.target===modal)close()};addEventListener("keydown",e=>{if(e.key==="Escape")close()});
</script>
</body>
</html>
