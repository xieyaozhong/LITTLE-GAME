<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>旋刃競技場｜戰鬥陀螺模擬器</title>
<style>
:root{--b:#070b15;--p:#111a2c;--l:#27334d;--t:#f5f7ff;--m:#9ba7c2;--c1:#41ccff;--c2:#ff5879}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#153b69 0,transparent 30%),radial-gradient(circle at 90% 5%,#5b1834 0,transparent 27%),var(--b);color:var(--t);font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}.app{max-width:1350px;margin:auto;padding:18px}h1{margin:0;font-size:clamp(28px,5vw,48px);letter-spacing:.08em}.sub{color:var(--m);margin:8px 0 18px}.grid{display:grid;grid-template-columns:280px minmax(400px,1fr) 280px;gap:16px}.card{background:linear-gradient(180deg,#172137ef,#0b101def);border:1px solid var(--l);border-radius:20px;box-shadow:0 18px 50px #0008;padding:16px}.side h2{margin:0 0 12px;font-size:18px}.row{margin:11px 0}.row label{display:flex;justify-content:space-between;font-size:13px;color:#dce3f2;margin-bottom:5px}.row input[type=text],select{width:100%;padding:9px;border-radius:10px;border:1px solid var(--l);background:#ffffff0d;color:white}.row option{background:#111a2c}.row input[type=range]{width:100%;accent-color:var(--a)}.v{color:var(--a);font-weight:900}.hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;font-weight:900}.hud>div:last-child{text-align:right}.bar{height:9px;background:#ffffff12;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;width:100%;background:linear-gradient(90deg,#5ce3a6,#ffd166,#ff5b74)}.arena{position:relative;aspect-ratio:1;border-radius:18px;overflow:hidden;border:1px solid #ffffff20}.arena canvas{width:100%;height:100%;display:block}.over{position:absolute;inset:0;display:grid;place-items:center;text-align:center;pointer-events:none;background:#0002}.over.hide{display:none}.big{font-size:clamp(34px,7vw,70px);font-weight:1000;text-shadow:0 4px 20px #000}.small{color:#d9e1f0;font-weight:700}.btns{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:9px;margin-top:11px}button{border:0;border-radius:12px;padding:12px;font-weight:900;cursor:pointer}.start{background:linear-gradient(135deg,#48d7ff,#70efb6);color:#061019}.pause{background:#ffffff12;color:white}.reset{background:linear-gradient(135deg,#ff5879,#ef7147);color:white}button:disabled{opacity:.45}.score{text-align:center;margin-top:10px;font-weight:900}.score b:first-child{color:var(--c1)}.score b:last-child{color:var(--c2)}#log{margin-top:14px;min-height:58px;color:#cbd4e8;font-size:13px;line-height:1.55}.legend{margin-top:9px;color:var(--m);font-size:12px;line-height:1.55}.zone-chip{display:inline-block;padding:2px 7px;margin-right:5px;border-radius:999px;border:1px solid #ffffff24;background:#ffffff0c}.inner-chip{color:#a9d8ff}.outer-chip{color:#ffd28b}@media(max-width:950px){.grid{grid-template-columns:1fr 1fr}.center{grid-column:1/-1;grid-row:1}}@media(max-width:620px){.app{padding:10px}.grid{grid-template-columns:1fr}.center{grid-column:auto}.btns{grid-template-columns:1fr 1fr}.start{grid-column:1/-1}}
</style>
</head>
<body>
<main class="app">
<h1>旋刃競技場</h1>
<p class="sub">不同型態擁有不同軌跡；衝出內層會被盤緣彈回，越過最外層才真正出局。</p>
<section class="grid">
<aside class="card side" style="--a:var(--c1)"><h2>🔵 藍方陀螺</h2><div id="p1"></div></aside>
<section class="center">
<div class="card">
<div class="hud"><div><span id="n1">蒼藍暴風</span><div class="bar"><div id="e1" class="fill"></div></div></div><span>VS</span><div><span id="n2">緋紅獠牙</span><div class="bar"><div id="e2" class="fill"></div></div></div></div>
<div class="arena"><canvas id="cv"></canvas><div id="over" class="over"><div><div class="big">READY</div><div class="small">按下開始戰鬥</div></div></div></div>
<div class="btns"><button id="start" class="start">開始戰鬥</button><button id="pause" class="pause" disabled>暫停</button><button id="reset" class="reset">重置</button></div>
<div class="score"><b>藍方 <span id="s1">0</span></b>　—　<b>紅方 <span id="s2">0</span></b></div>
</div>
<div id="log" class="card">系統已就緒。內層盤緣會反彈；只有飛出外層才算出界。</div>
<div class="legend"><span class="zone-chip inner-chip">內層主戰區</span><span class="zone-chip outer-chip">外層危險區</span>攻擊型：花瓣突進｜防禦型：中心反擊｜持久型：穩定環繞｜平衡型：橢圓變軌</div>
</section>
<aside class="card side" style="--a:var(--c2)"><h2>🔴 紅方陀螺</h2><div id="p2"></div></aside>
</section>
</main>
<script>
const $=s=>document.querySelector(s),cv=$('#cv'),ctx=cv.getContext('2d'),over=$('#over'),log=$('#log');
let W=700,H=700,outerR=290,innerR=215,dpr=1,run=false,paused=false,last=0,time=0,tops=[],parts=[],waves=[],score=[0,0],lastZoneLog=0;
const cfg={p1:{name:'蒼藍暴風',type:'balance',a:70,d:65,s:72,w:68,b:65},p2:{name:'緋紅獠牙',type:'attack',a:84,d:52,s:57,w:61,b:56}};
const typeName={attack:'攻擊型',defense:'防禦型',stamina:'持久型',balance:'平衡型'};
const preset={attack:[88,48,54,60,55],defense:[56,88,66,82,76],stamina:[47,62,92,58,72],balance:[70,68,72,67,66]};
const keys=[['a','攻擊'],['d','防禦'],['s','耐力'],['w','重量'],['b','爆裂抗性']];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>Math.random()*(b-a)+a,mag=(a,b)=>Math.hypot(a,b);
function ui(id){const c=cfg[id],el=$('#'+id);el.innerHTML=`<div class="row"><label>名稱</label><input data-k="name" type="text" maxlength="12" value="${c.name}"></div><div class="row"><label>類型</label><select data-k="type">${Object.entries(typeName).map(([v,n])=>`<option value="${v}" ${v===c.type?'selected':''}>${n}</option>`).join('')}</select></div>`+keys.map(([k,n])=>`<div class="row"><label>${n}<span class="v" id="${id}${k}">${c[k]}</span></label><input data-k="${k}" type="range" min="${k==='w'?35:20}" max="100" value="${c[k]}"></div>`).join('');el.oninput=e=>{const k=e.target.dataset.k;if(!k)return;c[k]=(k==='name'||k==='type')?e.target.value:+e.target.value;if(k!=='name'&&k!=='type')$('#'+id+k).textContent=c[k];$('#n'+(id==='p1'?1:2)).textContent=c.name||id};el.onchange=e=>{if(e.target.dataset.k!=='type')return;const ar=preset[c.type];keys.forEach(([k],i)=>c[k]=ar[i]);ui(id)}}
ui('p1');ui('p2');
function size(){const q=cv.getBoundingClientRect();W=q.width;H=q.height;dpr=Math.min(devicePixelRatio||1,2);cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);outerR=Math.min(W,H)*.445;innerR=outerR*.70}
addEventListener('resize',size);size();
function emit(px,py,c,n=18,power=1){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(35,180)*power;parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:rnd(.25,.75),c,r:rnd(.8,3.2)})}}
function wave(px,py,c,max=42){waves.push({x:px,y:py,c,r:3,max,l:1})}
function addLog(text){log.textContent=text}
class Top{
constructor(i,c){this.i=i;this.c={...c};this.col=i?'#ff5879':'#41ccff';this.r=10.5+c.w*.065;this.x=W/2+(i?1:-1)*innerR*.48;this.y=H/2+rnd(-innerR*.08,innerR*.08);this.phase=rnd(0,Math.PI*2);this.orbitDir=i?1:-1;this.zone='inner';this.rimCooldown=0;this.trail=[];this.out=false;this.burst=false;this.energy=100;this.burstMeter=0;this.angle=rnd(0,Math.PI*2);this.spin=20+c.s*.12;const launch=i?Math.PI+rnd(-.38,.38):rnd(-.38,.38),speed=112+c.a*1.05;this.vx=Math.cos(launch)*speed;this.vy=Math.sin(launch)*speed}
trajectory(dt,opponent){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist,tx=-ny*this.orbitDir,ty=nx*this.orbitDir;this.phase+=dt*(1.1+this.c.a/160);let ax=0,ay=0;
if(this.c.type==='attack'){const petal=Math.sin(this.phase*3.1);const targetR=innerR*(.42+.34*(petal*.5+.5));const radial=(targetR-dist)*.68;ax+=nx*radial+tx*(42+this.c.a*.20);ay+=ny*radial+ty*(42+this.c.a*.20);if(opponent&&!opponent.out&&!opponent.burst){const ox=opponent.x-this.x,oy=opponent.y-this.y,od=mag(ox,oy)||1;const dash=Math.max(0,Math.sin(this.phase*2.15))*this.c.a*.72;ax+=ox/od*dash;ay+=oy/od*dash}}
else if(this.c.type==='defense'){const targetR=innerR*.25;const radial=(targetR-dist)*1.28;ax+=nx*radial+tx*24;ay+=ny*radial+ty*24;if(opponent){const od=mag(opponent.x-cx,opponent.y-cy);if(od<innerR*.55){const ox=opponent.x-this.x,oy=opponent.y-this.y,d=mag(ox,oy)||1;ax+=ox/d*18;ay+=oy/d*18}}}
else if(this.c.type==='stamina'){const targetR=innerR*.58;const radial=(targetR-dist)*.55;ax+=nx*radial+tx*(30+this.c.s*.13);ay+=ny*radial+ty*(30+this.c.s*.13)}
else{const ellipse=innerR*(.40+.18*Math.sin(this.phase*1.4));const radial=(ellipse-dist)*.72;const sway=Math.sin(this.phase*2.3)*20;ax+=nx*radial+tx*(33+sway);ay+=ny*radial+ty*(33+sway)}
if(this.zone==='outer'){ax-=nx*(52+(dist-innerR)*.22);ay-=ny*(52+(dist-innerR)*.22);ax+=tx*10;ay+=ty*10}
this.vx+=ax*dt;this.vy+=ay*dt}
update(dt,opponent){if(this.out||this.burst)return;this.rimCooldown=Math.max(0,this.rimCooldown-dt);this.trajectory(dt,opponent);const speed=mag(this.vx,this.vy);const drag=1-dt*(this.zone==='outer'?.24:.075+(100-this.c.s)*.00105);this.vx*=Math.max(.94,drag);this.vy*=Math.max(.94,drag);const maxSpeed=190+this.c.a*1.9;if(speed>maxSpeed){this.vx=this.vx/speed*maxSpeed;this.vy=this.vy/speed*maxSpeed}this.x+=this.vx*dt;this.y+=this.vy*dt;const drain=(.70+speed*.0014)*(116-this.c.s)/58*(this.zone==='outer'?1.32:1);this.energy-=drain*dt*2.18;this.spin=Math.max(0,this.spin-drain*dt*.14);this.angle+=this.spin*dt;this.trail.push({x:this.x,y:this.y,l:1});if(this.trail.length>(this.c.type==='attack'?28:22))this.trail.shift();this.trail.forEach(p=>p.l-=dt*(this.c.type==='stamina'?1.7:2.35));this.trail=this.trail.filter(p=>p.l>0);this.handleRims();if(this.energy<0)this.energy=0}
handleRims(){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist,radial=this.vx*nx+this.vy*ny;
if(this.zone==='inner'&&dist>innerR-this.r*.55&&this.rimCooldown<=0){const climb=radial+this.c.a*.23+this.c.w*.08;const threshold=78+this.c.d*.20;if(climb>threshold){this.zone='outer';this.rimCooldown=.24;this.energy-=2.2;wave(this.x,this.y,'#ffd166',34);emit(this.x,this.y,'#ffd166',10,.55);if(performance.now()-lastZoneLog>600){addLog(`${this.c.name} 衝上外層危險區！`);lastZoneLog=performance.now()}}else{this.x=W/2+nx*(innerR-this.r*.7);this.y=H/2+ny*(innerR-this.r*.7);const bounce=Math.max(45,Math.abs(radial)*(.92+this.c.d*.002));this.vx-=nx*(radial+bounce);this.vy-=ny*(radial+bounce);this.vx+=-ny*this.orbitDir*14;this.vy+=nx*this.orbitDir*14;this.energy-=Math.max(0,radial)*.012;this.rimCooldown=.12;wave(this.x,this.y,'#8fd8ff',28)}}
if(this.zone==='outer'&&dist<innerR-this.r*1.1&&radial<0){this.zone='inner';this.rimCooldown=.2;wave(this.x,this.y,'#8fffc6',26)}
if(dist>outerR+this.r*.35){this.out=true;emit(this.x,this.y,this.col,58,1.25);wave(this.x,this.y,this.col,60);addLog(`${this.c.name} 飛出外層，正式出局！`)}}
draw(){if(this.out||this.burst)return;this.trail.forEach((p,i)=>{const a=clamp(p.l,0,1)*(i/Math.max(1,this.trail.length))*.28;ctx.fillStyle=alpha(this.col,a);ctx.beginPath();ctx.arc(p.x,p.y,this.r*(.10+i/this.trail.length*.28),0,Math.PI*2);ctx.fill()});ctx.save();const wob=clamp((28-this.energy)/28,0,1)*3.2;ctx.translate(this.x+Math.sin(this.angle*.42)*wob,this.y+Math.cos(this.angle*.37)*wob);ctx.rotate(this.angle);ctx.shadowBlur=14;ctx.shadowColor=this.col;const spikes=this.c.type==='attack'?10:this.c.type==='defense'?6:8;ctx.beginPath();for(let i=0;i<spikes*2;i++){const a=i*Math.PI/spikes,r=i%2?this.r*.72:this.r,px=Math.cos(a)*r,py=Math.sin(a)*r;i?ctx.lineTo(px,py):ctx.moveTo(px,py)}ctx.closePath();const g=ctx.createRadialGradient(-3,-4,1,0,0,this.r);g.addColorStop(0,'#fff');g.addColorStop(.24,this.col);g.addColorStop(1,'#070a12');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#ffffff99';ctx.lineWidth=1.4;ctx.stroke();ctx.fillStyle='#09101d';ctx.beginPath();ctx.arc(0,0,this.r*.43,0,Math.PI*2);ctx.fill();ctx.strokeStyle=this.col;ctx.stroke();ctx.restore()}}
function alpha(hex,a){const h=hex.replace('#',''),n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function collide(a,b){if(a.out||b.out||a.burst||b.burst)return;const dx=b.x-a.x,dy=b.y-a.y,dist=mag(dx,dy),min=a.r+b.r;if(!dist||dist>=min)return;const nx=dx/dist,ny=dy/dist,overlap=min-dist;a.x-=nx*overlap/2;a.y-=ny*overlap/2;b.x+=nx*overlap/2;b.y+=ny*overlap/2;const rel=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(rel>0)return;const m1=a.c.w/55,m2=b.c.w/55,imp=-1.72*rel/(1/m1+1/m2);a.vx-=imp/m1*nx;a.vy-=imp/m1*ny;b.vx+=imp/m2*nx;b.vy+=imp/m2*ny;const power=Math.abs(rel)+imp*.11;a.energy-=power*(122-a.c.d)*b.c.a/300000;b.energy-=power*(122-b.c.d)*a.c.a/300000;a.burstMeter+=power*(122-a.c.b)/830;b.burstMeter+=power*(122-b.c.b)/830;emit((a.x+b.x)/2,(a.y+b.y)/2,'#fff',Math.min(26,7+power/10),.72);wave((a.x+b.x)/2,(a.y+b.y)/2,'#fff',clamp(power*.18,20,48));[a,b].forEach(t=>{if(t.burstMeter>84&&Math.random()<(t.burstMeter-80)/520){t.burst=true;emit(t.x,t.y,t.col,76,1.7);addLog(`${t.c.name} 被強烈撞擊後爆裂！`)}})}
function drawArena(){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2;let g=ctx.createRadialGradient(cx,cy,4,cx,cy,outerR*1.1);g.addColorStop(0,'#334765');g.addColorStop(.49,'#1b2a42');g.addColorStop(.70,'#29344a');g.addColorStop(.72,'#111827');g.addColorStop(1,'#070a12');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ffffff12';ctx.lineWidth=1.2;for(let i=1;i<=4;i++){ctx.beginPath();ctx.arc(cx,cy,innerR*i/4,0,Math.PI*2);ctx.stroke()}
ctx.save();ctx.shadowBlur=15;ctx.shadowColor='#7fcfff66';ctx.strokeStyle='#a9d8ffcc';ctx.lineWidth=8;ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.stroke();ctx.restore();ctx.strokeStyle='#ffffff30';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,innerR-7,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#ffc66b12';ctx.beginPath();ctx.arc(cx,cy,outerR-5,0,Math.PI*2);ctx.arc(cx,cy,innerR+7,0,Math.PI*2,true);ctx.fill();const edge=ctx.createLinearGradient(cx-outerR,cy,cx+outerR,cy);edge.addColorStop(0,'#41ccff');edge.addColorStop(.5,'#f4f7ff');edge.addColorStop(1,'#ff5879');ctx.strokeStyle=edge;ctx.lineWidth=9;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#dcecffaa';ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.fillText('INNER BOWL',cx,cy-innerR+23);ctx.fillStyle='#ffd38baa';ctx.fillText('OUTER DANGER ZONE',cx,cy-outerR+22);waves.forEach(w=>{ctx.globalAlpha=clamp(w.l,0,1);ctx.strokeStyle=w.c;ctx.lineWidth=2;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke()});ctx.globalAlpha=1;tops.forEach(t=>t.draw());parts.forEach(p=>{ctx.globalAlpha=clamp(p.l*2,0,1);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}
function effects(dt){parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;p.l-=dt});parts=parts.filter(p=>p.l>0);waves.forEach(w=>{w.r+=(w.max-w.r)*dt*8;w.l-=dt*2.5});waves=waves.filter(w=>w.l>0)}
function bars(){if(!tops.length)return;$('#e1').style.width=clamp(tops[0].energy,0,100)+'%';$('#e2').style.width=clamp(tops[1].energy,0,100)+'%'}
function result(){if(tops.length<2)return;const [a,b]=tops;let loser=-1,why='';if(a.burst){loser=0;why='爆裂勝利'}else if(b.burst){loser=1;why='爆裂勝利'}else if(a.out){loser=0;why='外層出界勝利'}else if(b.out){loser=1;why='外層出界勝利'}else if(a.energy<=0&&mag(a.vx,a.vy)<28){loser=0;why='持久勝利'}else if(b.energy<=0&&mag(b.vx,b.vy)<28){loser=1;why='持久勝利'}else if(time>75){loser=a.energy<b.energy?0:1;why='時間判定'}if(loser<0)return;const win=1-loser;run=false;paused=false;score[win]++;$('#s1').textContent=score[0];$('#s2').textContent=score[1];$('#start').disabled=false;$('#start').textContent='再戰一場';$('#pause').disabled=true;over.classList.remove('hide');over.innerHTML=`<div><div class="big" style="color:${tops[win].col}">${tops[win].c.name} 勝利</div><div class="small">${why}・${time.toFixed(1)} 秒</div></div>`;addLog(`${tops[win].c.name} 以「${why}」取得勝利！`)}
function loop(ts){const dt=Math.min((ts-last)/1000||0,.025);last=ts;if(run&&!paused){time+=dt;tops[0].update(dt,tops[1]);tops[1].update(dt,tops[0]);collide(tops[0],tops[1]);effects(dt);bars();result()}else effects(dt);drawArena();requestAnimationFrame(loop)}
$('#start').onclick=()=>{tops=[new Top(0,cfg.p1),new Top(1,cfg.p2)];time=0;run=true;paused=false;parts=[];waves=[];$('#start').disabled=true;$('#pause').disabled=false;$('#pause').textContent='暫停';$('#n1').textContent=cfg.p1.name;$('#n2').textContent=cfg.p2.name;over.classList.remove('hide');over.innerHTML='<div><div class="big">3・2・1</div><div class="small">LET IT RIP!</div></div>';setTimeout(()=>over.classList.add('hide'),650);addLog(`${cfg.p1.name} 對決 ${cfg.p2.name}，雙層戰鬥盤啟動！`)};
$('#pause').onclick=()=>{if(!run)return;paused=!paused;$('#pause').textContent=paused?'繼續':'暫停'};
$('#reset').onclick=()=>{run=false;paused=false;tops=[];parts=[];waves=[];score=[0,0];$('#s1').textContent=$('#s2').textContent='0';$('#start').disabled=false;$('#start').textContent='開始戰鬥';$('#pause').disabled=true;$('#e1').style.width=$('#e2').style.width='100%';over.classList.remove('hide');over.innerHTML='<div><div class="big">READY</div><div class="small">按下開始戰鬥</div></div>';addLog('模擬器已重置。內層盤緣會反彈，越過外層才出局。')};
requestAnimationFrame(loop);
</script>
</body>
</html>
